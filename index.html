<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title></title>
    <meta name="description" content="">
  
    <link rel="icon" type="image/x-icon" href="/assets/img/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/assets/css/site.css">
    <script src="assets/js/site.js" defer></script>
</head>

<body>

<!-- Slideshow container -->
<section class="slideshow-container">

  <!-- Full-width images with number and caption text -->
  <figure class="mySlides fade">
    <div class="numbertext">1 / 3</div>
    <img src="assets/img/gallery/Reunion-Island-01.jpg" style="width:100%">
    <div class="text">Caption Text</div>
  </figure>

  <figure class="mySlides fade">
    <div class="numbertext">2 / 3</div>
    <img src="assets/img/gallery/Reunion-Island-02.jpg" style="width:100%">
    <div class="text">Caption Two</div>
  </figure>

  <figure class="mySlides fade">
    <div class="numbertext">3 / 3</div>
    <img src="assets/img/gallery/Reunion-Island-03.jpg" style="width:100%">
    <div class="text">Caption Three</div>
  </figure>

  <!-- Next and previous buttons -->
  <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
  <a class="next" onclick="plusSlides(1)">&#10095;</a>
</section>


<!-- The dots/circles -->
<div style="text-align:center">
  <span class="dot" onclick="currentSlide(1)"></span>
  <span class="dot" onclick="currentSlide(2)"></span>
  <span class="dot" onclick="currentSlide(3)"></span>
</div>

</body>

</html>
